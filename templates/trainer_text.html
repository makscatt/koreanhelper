{% extends "trainer_base.html" %}

{% block title %}Тексты — {{ student.name }}{% endblock %}

{% block trainer_content %}
<script>document.body.dataset.module = 'texts';</script>

<div class="trainer-header">
  <span class="trainer-title">Тексты и слова</span>
</div>

<div style="max-width:860px;width:100%;">
  <div class="texts-grid" id="texts-grid"></div>
</div>

<!-- ══════ TEXT MODAL ══════ -->
<div id="text-modal-overlay" class="txt-overlay">
  <div class="txt-modal">
    <div class="txt-modal-head">
      <div class="txt-modal-nav">
        <button class="txt-nav-btn" onclick="prevText()">←</button>
        <span class="txt-modal-counter" id="txt-counter">1 / 1</span>
        <button class="txt-nav-btn" onclick="nextText()">→</button>
      </div>
      <div class="txt-modal-title" id="txt-modal-title"></div>
      <div class="txt-modal-actions">
        <div class="txt-check-btns" id="txt-modal-checks">
          <button class="txt-check-btn" id="modal-btn-done" onclick="toggleTextCheck('done')" title="Пройдено">✅</button>
          <button class="txt-check-btn" id="modal-btn-hw" onclick="toggleTextCheck('homework')" title="Домашка">📝</button>
        </div>
        <button class="txt-close-btn" onclick="closeTextModal()">✕</button>
      </div>
    </div>

    <!-- Color toolbar -->
    <div class="txt-toolbar">
      <span style="font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);">Выделить:</span>
      <button class="color-btn" data-color="blue" style="background:#a0c4ff;"></button>
      <button class="color-btn" data-color="red" style="background:#ffadad;"></button>
      <button class="color-btn" data-color="green" style="background:#b9fbc0;"></button>
      <button class="color-btn" data-color="yellow" style="background:#fdffb6;"></button>
      <div style="flex:1;"></div>
      <button class="txt-words-btn" id="txt-words-btn" onclick="openWordStudy()" style="display:none;">📚 Слова</button>
    </div>

    <!-- Text body -->
    <div class="txt-modal-body" id="txt-modal-body"></div>

    <!-- Bottom nav -->
    <div class="txt-modal-foot">
      <button class="txt-foot-btn" onclick="prevText()">← Назад</button>
      <button class="txt-foot-btn txt-foot-primary" onclick="nextText()">Далее →</button>
    </div>
  </div>
</div>

<!-- ══════ WORD STUDY MODAL ══════ -->
<div id="word-modal-overlay" class="txt-overlay" style="z-index:5100;">
  <div style="
    background:var(--bg-surface); width:90%; max-width:480px;
    border:1px solid var(--border-color); border-radius:4px;
    padding:32px 28px 24px; display:flex; flex-direction:column;
    align-items:center; gap:14px; position:relative; text-align:center;
  ">
    <button onclick="closeWordModal()" style="
      position:absolute; top:12px; right:14px;
      background:none; border:none; font-size:18px;
      cursor:pointer; color:var(--text-tertiary); line-height:1;
    ">×</button>

    <div id="word-study-title" style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;"></div>
    <div id="card-base" style="font-family:'Noto Sans KR',sans-serif;font-size:2.8rem;font-weight:400;color:var(--text-primary);">...</div>
    <div id="card-meaning" style="font-size:1.1rem;color:var(--text-tertiary);font-family:var(--font-mono);">...</div>

    <div id="card-forms" style="
      width:100%; display:flex; flex-direction:column; gap:8px; margin-bottom:8px;
      visibility:hidden; opacity:0; transition:opacity 0.2s;
    ">
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-family:var(--font-mono);color:var(--text-tertiary);">
        Прош: <b id="val-past" style="color:var(--text-primary);">—</b>
        <span class="mini-speaker" onclick="speakTense('past')">🔊</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-family:var(--font-mono);color:var(--text-tertiary);">
        Наст: <b id="val-pres" style="color:var(--text-primary);">—</b>
        <span class="mini-speaker" onclick="speakTense('pres')">🔊</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-family:var(--font-mono);color:var(--text-tertiary);">
        Будущ: <b id="val-fut" style="color:var(--text-primary);">—</b>
        <span class="mini-speaker" onclick="speakTense('fut')">🔊</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="toggleCardForms()">👁 Формы</button>
      <button class="btn" onclick="speakCurrentWord()">🔊</button>
      <button class="btn" onclick="prevWord()">← Назад</button>
      <button class="btn btn-primary" onclick="nextWord()">Далее →</button>
    </div>
  </div>
</div>

<style>
/* ── Grid ── */
.texts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}
.text-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md, 12px);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.text-card:hover { border-color: var(--primary); box-shadow: var(--shadow-1); }
.text-card-head { display:flex; justify-content:space-between; align-items:center; }
.text-card-title { font-size:15px; font-weight:600; color:var(--text-primary); }
.text-card-status { font-size:14px; }
.text-card-preview {
  font-size:12px; color:var(--text-tertiary); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.text-card-meta {
  display:flex; gap:8px; align-items:center; font-size:11px; color:var(--text-tertiary);
  font-family:var(--font-mono);
}

/* ── Modal ── */
.txt-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center;
  z-index:5000;
}
.txt-overlay.open { display:flex; }
.txt-modal {
  background:var(--bg-surface); width:94%; max-width:720px;
  max-height:92vh; border-radius:4px;
  border:1px solid var(--border-color);
  display:flex; flex-direction:column;
}
.txt-modal-head {
  display:flex; align-items:center; gap:12px;
  padding:14px 20px; border-bottom:1px solid var(--border-color);
  flex-shrink:0;
}
.txt-modal-nav { display:flex; align-items:center; gap:6px; }
.txt-nav-btn {
  width:28px; height:28px; border:1px solid var(--border-color);
  border-radius:6px; background:var(--bg-surface); cursor:pointer;
  font-size:14px; display:flex; align-items:center; justify-content:center;
  transition:all 0.12s;
}
.txt-nav-btn:hover { background:var(--bg-app); }
.txt-modal-counter { font-size:12px; font-family:var(--font-mono); color:var(--text-tertiary); min-width:40px; text-align:center; }
.txt-modal-title { flex:1; font-size:16px; font-weight:600; color:var(--text-primary); }
.txt-modal-actions { display:flex; align-items:center; gap:8px; }
.txt-close-btn {
  width:28px; height:28px; border:1px solid var(--border-color);
  border-radius:6px; background:var(--bg-surface); cursor:pointer;
  font-size:14px; display:flex; align-items:center; justify-content:center;
}
.txt-close-btn:hover { background:#fef2f2; color:#ef4444; border-color:#fecaca; }

/* Check buttons */
.txt-check-btns { display:flex; gap:4px; }
.txt-check-btn {
  width:30px; height:30px; border:1px solid var(--border-color);
  border-radius:8px; background:var(--bg-surface); cursor:pointer;
  font-size:13px; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; opacity:0.5;
}
.txt-check-btn:hover { opacity:0.8; transform:scale(1.1); }
.txt-check-btn.active { opacity:1; border-color:var(--primary); background:var(--primary-container); }

/* Toolbar */
.txt-toolbar {
  display:flex; align-items:center; gap:8px;
  padding:8px 20px; border-bottom:1px solid var(--border-light);
  flex-shrink:0;
}
.color-btn {
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--border-color); cursor:pointer;
  transition:transform 0.15s;
}
.color-btn.active { border-color:var(--text-primary) !important; transform:scale(1.15); }
.txt-words-btn {
  padding:4px 12px; font-size:12px; font-weight:600;
  border:1px solid var(--border-color); border-radius:6px;
  background:var(--bg-app); cursor:pointer; transition:all 0.12s;
}
.txt-words-btn:hover { background:var(--primary-container); color:var(--primary); border-color:var(--primary-container); }

/* Body */
.txt-modal-body {
  flex:1; overflow-y:auto; padding:32px 60px;
  font-family:'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  font-size:1.7rem; line-height:1.8; color:var(--text-primary);
  white-space:pre-wrap; word-break:keep-all;
  text-align:left;
  max-width:640px; margin:0 auto; width:100%;
}
.txt-modal-body .highlight-blue   { background:#a0c4ff; border-radius:2px; padding:0 1px; cursor:pointer; }
.txt-modal-body .highlight-red    { background:#ffadad; border-radius:2px; padding:0 1px; cursor:pointer; }
.txt-modal-body .highlight-green  { background:#b9fbc0; border-radius:2px; padding:0 1px; cursor:pointer; }
.txt-modal-body .highlight-yellow { background:#fdffb6; border-radius:2px; padding:0 1px; cursor:pointer; }

/* Foot */
.txt-modal-foot {
  display:flex; justify-content:center; gap:10px;
  padding:12px 20px; border-top:1px solid var(--border-color);
  flex-shrink:0;
}
.txt-foot-btn {
  padding:8px 24px; font-size:13px; font-weight:600;
  font-family:var(--font-main,inherit);
  border:1px solid var(--border-color); border-radius:8px;
  background:var(--bg-surface); color:var(--text-primary);
  cursor:pointer; transition:all 0.12s; white-space:nowrap;
}
.txt-foot-btn:hover { background:var(--bg-app); }
.txt-foot-primary {
  background:var(--primary); color:#fff; border-color:var(--primary);
}
.txt-foot-primary:hover { filter:brightness(1.1); }

@media (max-width:600px) {
  .txt-modal { width:100%; max-width:100%; max-height:100vh; border-radius:0; }
  .txt-modal-body { font-size:1.4rem; padding:24px 16px; }
  .texts-grid { grid-template-columns:1fr; }
}
</style>
{% endblock %}

{% block trainer_js %}
<script>
  let allTextsData = [];
  let textChecks = {};
  let currentTextIdx = 0;
  let activeColor = null;
  let currentWordList = [], currentWordIndex = 0;
  const STUDENT_ID = {{ student.id }};

  function slugify(title) { return title.replace(/\s+/g, '_').toLowerCase(); }
  function getStatusIcon(slug) {
    const s = textChecks[slug] || '';
    if (s === 'done') return '✅';
    if (s === 'homework') return '📝';
    return '';
  }

  // ── LOAD ──
  async function loadData() {
    try {
      const res = await fetch('/api/items/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: STUDENT_ID, trainer: 'texts' })
      });
      const data = await res.json();
      if (data.ok) textChecks = data.items;
    } catch(e) {}

    try {
      const res = await fetch('/static/data/texts.json');
      if (!res.ok) throw new Error();
      allTextsData = await res.json();
    } catch {
      allTextsData = [
        { title:"요리", text:"한국 사람들은 김치찌개를 자주 먹어요.\n김치찌개에는 김치와 돼지고기가 들어가요.",
          vocab:[{ base:"먹다", mean:"Есть", past:"먹었어요", pres:"먹어요", fut:"먹을 거예요" }] }
      ];
    }
    renderGrid();
  }

  // ── GRID ──
  function renderGrid() {
    const grid = document.getElementById('texts-grid');
    grid.innerHTML = allTextsData.map((item, i) => {
      const slug = slugify(item.title);
      const icon = getStatusIcon(slug);
      const preview = item.text.replace(/\n/g, ' ').substring(0, 100) + '…';
      const wordCount = (item.vocab && item.vocab.length) || 0;
      return `
        <div class="text-card" onclick="openTextModal(${i})">
          <div class="text-card-head">
            <div class="text-card-title">${item.title}</div>
            <div class="text-card-status">${icon}</div>
          </div>
          <div class="text-card-preview">${preview}</div>
          <div class="text-card-meta">
            ${wordCount ? '<span>📚 ' + wordCount + ' слов</span>' : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── TEXT MODAL ──
  const textOverlay = document.getElementById('text-modal-overlay');

  function openTextModal(idx) {
    currentTextIdx = idx;
    renderTextModal();
    textOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeTextModal() {
    textOverlay.classList.remove('open');
    document.body.style.overflow = '';
    activeColor = null;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  }

  textOverlay.addEventListener('click', e => { if (e.target === textOverlay) closeTextModal(); });

  function renderTextModal() {
    const item = allTextsData[currentTextIdx];
    document.getElementById('txt-modal-title').textContent = item.title;
    document.getElementById('txt-counter').textContent = (currentTextIdx + 1) + ' / ' + allTextsData.length;
    document.getElementById('txt-modal-body').textContent = item.text;

    const wordsBtn = document.getElementById('txt-words-btn');
    wordsBtn.style.display = (item.vocab && item.vocab.length) ? '' : 'none';

    updateModalChecks();

    if (!IS_TEACHER) {
      document.getElementById('txt-modal-checks').style.pointerEvents = 'none';
    }
  }

  function updateModalChecks() {
    const slug = slugify(allTextsData[currentTextIdx].title);
    const status = textChecks[slug] || '';
    document.getElementById('modal-btn-done').classList.toggle('active', status === 'done');
    document.getElementById('modal-btn-hw').classList.toggle('active', status === 'homework');
  }

  async function toggleTextCheck(newStatus) {
    if (!IS_TEACHER) return;
    const slug = slugify(allTextsData[currentTextIdx].title);
    const current = textChecks[slug] || '';
    const finalStatus = current === newStatus ? '' : newStatus;

    try {
      await fetch('/api/items/set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          student_id: STUDENT_ID, trainer: 'texts',
          item_id: slug, status: finalStatus
        })
      });
      if (finalStatus) { textChecks[slug] = finalStatus; }
      else { delete textChecks[slug]; }
    } catch(e) {}

    updateModalChecks();
    renderGrid();
  }

  function nextText() {
    if (!allTextsData.length) return;
    currentTextIdx = (currentTextIdx + 1) % allTextsData.length;
    renderTextModal();
  }
  function prevText() {
    if (!allTextsData.length) return;
    currentTextIdx = (currentTextIdx - 1 + allTextsData.length) % allTextsData.length;
    renderTextModal();
  }

  // ── HIGHLIGHTING ──
  document.querySelector('.txt-toolbar').addEventListener('click', e => {
    if (!e.target.classList.contains('color-btn')) return;
    const color = e.target.dataset.color;
    if (activeColor === color) {
      activeColor = null;
      e.target.classList.remove('active');
    } else {
      activeColor = color;
      document.querySelectorAll('.txt-toolbar .color-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
    }
  });

  document.getElementById('txt-modal-body').addEventListener('mouseup', () => {
    if (!activeColor) return;
    const sel = window.getSelection();
    const body = document.getElementById('txt-modal-body');
    if (sel.isCollapsed || !body.contains(sel.anchorNode)) return;
    const range = sel.getRangeAt(0);
    if (!range.toString().trim()) return;
    try {
      const span = document.createElement('span');
      span.className = `highlight-${activeColor}`;
      range.surroundContents(span);
      sel.removeAllRanges();
    } catch(e) {}
  });

  document.getElementById('txt-modal-body').addEventListener('click', e => {
    if (e.target.tagName === 'SPAN' && e.target.className.startsWith('highlight-')) {
      const parent = e.target.parentNode;
      parent.insertBefore(document.createTextNode(e.target.textContent), e.target);
      parent.removeChild(e.target);
      parent.normalize();
    }
  });

  // ── WORD STUDY ──
  const wordOverlay = document.getElementById('word-modal-overlay');

  function openWordStudy() {
    const item = allTextsData[currentTextIdx];
    if (!item.vocab || !item.vocab.length) return;
    currentWordList = item.vocab;
    currentWordIndex = 0;
    document.getElementById('word-study-title').textContent = item.title;
    updateCardUI();
    wordOverlay.style.display = 'flex';
    trackExercise();
  }

  function closeWordModal() {
    wordOverlay.style.display = 'none';
    document.getElementById('card-forms').style.visibility = 'hidden';
    document.getElementById('card-forms').style.opacity = '0';
  }

  wordOverlay.addEventListener('click', e => { if (e.target === wordOverlay) closeWordModal(); });

  function updateCardUI() {
    const word = currentWordList[currentWordIndex];
    document.getElementById('card-base').textContent = word.base;
    document.getElementById('card-meaning').textContent = word.mean;
    document.getElementById('val-past').textContent = word.past || '—';
    document.getElementById('val-pres').textContent = word.pres || '—';
    document.getElementById('val-fut').textContent = word.fut || '—';
    document.getElementById('card-forms').style.visibility = 'hidden';
    document.getElementById('card-forms').style.opacity = '0';
  }

  function toggleCardForms() {
    const forms = document.getElementById('card-forms');
    const hidden = forms.style.visibility === 'hidden';
    forms.style.visibility = hidden ? 'visible' : 'hidden';
    forms.style.opacity = hidden ? '1' : '0';
  }

  function nextWord() {
    if (!currentWordList.length) return;
    currentWordIndex = (currentWordIndex + 1) % currentWordList.length;
    updateCardUI();
  }
  function prevWord() {
    if (!currentWordList.length) return;
    currentWordIndex = (currentWordIndex - 1 + currentWordList.length) % currentWordList.length;
    updateCardUI();
  }
  function speakCurrentWord() {
    const word = currentWordList[currentWordIndex];
    if (word) speakText(word.base);
  }
  function speakTense(tense) {
    event.stopPropagation();
    const word = currentWordList[currentWordIndex];
    if (!word) return;
    const text = tense === 'past' ? word.past : tense === 'pres' ? word.pres : word.fut;
    if (text) speakText(text);
  }

  // ── KEYBOARD ──
  document.addEventListener('keydown', e => {
    if (!textOverlay.classList.contains('open')) return;
    if (e.key === 'Escape') {
      if (wordOverlay.style.display === 'flex') { closeWordModal(); return; }
      closeTextModal(); return;
    }
    if (wordOverlay.style.display === 'flex') return;
    if (e.key === 'ArrowRight') nextText();
    else if (e.key === 'ArrowLeft') prevText();
  });

  // ── INIT ──
  loadData();
</script>
{% endblock %}
