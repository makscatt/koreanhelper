{% extends "trainer_base.html" %}
{% block title %}Место — {{ student.name }}{% endblock %}
{% block trainer_content %}
<div class="trainer-header">
  
  <h1 class="trainer-title">Местоположение</h1>
</div>
<div class="display-container">
  <div class="scene-container">
    <!-- Крышка коробки (позади кота) z=10 -->
    <div class="pixel-obj box-part-back">
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect x="5" y="5" width="90" height="20" fill="#6d4c41" stroke="#5d4037" stroke-width="3" rx="2"/>
      </svg>
    </div>
    <!-- Кот -->
    <div class="pixel-obj pixel-cat" id="cat-obj">
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <path d="M75 65 Q92 52 84 42" fill="none" stroke="#ffa726" stroke-width="8" stroke-linecap="round"/>
        <rect x="22" y="45" width="56" height="40" fill="#ffa726" rx="5"/>
        <circle cx="50" cy="38" r="24" fill="#ffa726"/>
        <path d="M30 22 L25 5 L44 17 Z" fill="#ffa726"/>
        <path d="M70 22 L75 5 L56 17 Z" fill="#ffa726"/>
        <circle cx="40" cy="33" r="3" fill="#333"/>
        <circle cx="60" cy="33" r="3" fill="#333"/>
        <circle cx="50" cy="41" r="2" fill="pink"/>
      </svg>
    </div>
    <!-- Передняя стенка коробки (перед котом) z=30 -->
    <div class="pixel-obj box-part-front">
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <rect x="5" y="5" width="90" height="90" fill="#c19a6b" stroke="#5d4037" stroke-width="3" rx="2"/>
        <line x1="12" y1="10" x2="12" y2="90" stroke="#a1887f" stroke-width="2"/>
      </svg>
    </div>
  </div>
  <div class="big-text" id="loc-sentence" style="font-size:1.4rem;">고양이가 상자</div>
  <div class="answer-slot" id="loc-answer" style="color:#007bff;font-weight:700;">앞에 있어요</div>
  <div class="controls">
    <button class="action-btn warning" onclick="toggleLoc()">👁️</button>
    <button class="action-btn secondary" onclick="speakLoc()">🔊</button>
    <button class="action-btn" onclick="prevLoc()">⬅️</button>
    <button class="action-btn" onclick="nextLoc()">➡️</button>
    <button class="action-btn" onclick="generateLoc()">🎲</button>
  </div>
</div>
{% endblock %}
{% block trainer_js %}
<script>
document.body.dataset.module = 'locations';
const locs=[
  {word:'위',     sentence:'고양이가 상자 위에 있어요',      style:{top:'5px',   left:'100px', zIndex:40}},
  {word:'아래 (밑)',sentence:'고양이가 상자 아래에 있어요',  style:{top:'200px', left:'100px', zIndex:40}},
  {word:'앞',    sentence:'고양이가 상자 앞에 있어요',      style:{top:'155px', left:'100px', zIndex:40}},
  {word:'뒤',    sentence:'고양이가 상자 뒤에 있어요',      style:{top:'60px',  left:'100px', zIndex:5}},
  {word:'왼쪽 (옆)',sentence:'고양이가 상자 왼쪽에 있어요', style:{top:'100px', left:'5px',   zIndex:40}},
  {word:'오른쪽 (옆)',sentence:'고양이가 상자 오른쪽에 있어요',style:{top:'100px',left:'195px',zIndex:40}},
  {word:'안',    sentence:'고양이가 상자 안에 있어요',      style:{top:'110px', left:'100px', zIndex:20}},
];
let li=0;
function setLoc(i){li=i;const cat=document.getElementById('cat-obj');cat.style.top=locs[i].style.top;cat.style.left=locs[i].style.left;cat.style.zIndex=locs[i].style.zIndex;const el=document.getElementById('loc-answer');el.textContent=locs[i].word+'에 있어요';el.style.visibility='hidden';}
function toggleLoc(){const el=document.getElementById('loc-answer');el.style.visibility=el.style.visibility==='hidden'?'visible':'hidden';}
function speakLoc(){speakText(locs[li].sentence);}
function prevLoc(){setLoc((li-1+locs.length)%locs.length);}
function nextLoc(){setLoc((li+1)%locs.length);}
function generateLoc(){setLoc(randExcept(locs.length,li));}
setLoc(2);
</script>
{% endblock %}
