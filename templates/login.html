{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>Вход</h1>

        <!-- Переключатель роли -->
        <div class="role-switcher" id="role-switcher">
            <button type="button" class="role-btn active" id="btn-teacher" onclick="setRole('teacher')">
                👨‍🏫 Учитель
            </button>
            <button type="button" class="role-btn" id="btn-student" onclick="setRole('student')">
                🎓 Ученик
            </button>
        </div>

        <form method="POST">
            <input type="hidden" name="login_as" id="login_as" value="teacher">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Войти</button>
        </form>

        <p class="auth-link" id="register-link">Нет аккаунта учителя? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
    </div>
</div>

<style>
.role-switcher {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--bg-app, #f5f6fa);
    border-radius: 10px;
    padding: 4px;
}
.role-btn {
    flex: 1;
    padding: 9px 12px;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-main, inherit);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text-secondary, #666);
}
.role-btn.active {
    background: var(--bg-surface, #fff);
    color: var(--primary, #4758d6);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.role-btn:hover:not(.active) {
    color: var(--text-primary, #1a1d2e);
}
</style>

<script>
function setRole(role) {
    document.getElementById('login_as').value = role;
    document.getElementById('btn-teacher').classList.toggle('active', role === 'teacher');
    document.getElementById('btn-student').classList.toggle('active', role === 'student');
    document.getElementById('register-link').style.display = role === 'teacher' ? '' : 'none';
}
</script>
{% endblock %}
